name: 'Setup Python Environment'
description: 'Set up Python with pip cache and install project dependencies'

inputs:
  python-version:
    description: 'Python version to install'
    required: false
    default: '3.11'
  install-extras:
    description: 'pip extras to install (e.g. "test", "dev", "test,dev")'
    required: false
    default: ''
  install-requirements:
    description: 'Install requirements.txt'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'

    - name: Upgrade pip
      shell: bash
      run: python -m pip install --upgrade pip setuptools wheel

    - name: Install requirements.txt
      if: inputs.install-requirements == 'true'
      shell: bash
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Install package with extras
      if: inputs.install-extras != ''
      shell: bash
      run: pip install -e ".[${{ inputs.install-extras }}]"

    - name: Install package (no extras)
      if: inputs.install-extras == ''
      shell: bash
      run: pip install -e .
