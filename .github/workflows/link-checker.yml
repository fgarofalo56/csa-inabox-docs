name: Link Checker

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**/*.md'
      - 'README.md'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**/*.md'
      - 'README.md'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          install-extras: 'test'

      - name: Run link checker
        id: run_checker
        run: |
          echo "Running link checker..."
          python << 'PYEOF' 2>&1 | tee link_checker_output.log
          import asyncio
          from pathlib import Path

          try:
              from csa_docs_tools import LinkValidator

              async def validate():
                  async with LinkValidator(Path('.')) as validator:
                      results = await validator.validate_all_links(check_external=False)
                      report = validator.generate_report(results)
                      print(f'Total internal links checked: {report["total_links"]}')
                      print(f'Broken links found: {report["broken_links"]}')
                      if report['broken_links'] > 0:
                          print('\nBroken links:')
                          for broken in report.get('broken_link_details', [])[:20]:
                              print(f'  {broken["file"]}: {broken["url"]}')

              asyncio.run(validate())
          except ImportError:
              # Fallback to simple regex-based checker
              import re

              docs_dir = Path('docs')
              broken_links = []
              total_links = 0

              for md_file in sorted(docs_dir.rglob('*.md')):
                  try:
                      content = md_file.read_text(encoding='utf-8', errors='replace')
                  except Exception:
                      continue

                  links = re.findall(r'\[([^\]]*)\]\(([^)]+)\)', content)

                  for text, link in links:
                      if link.startswith(('http://', 'https://', '#', 'mailto:')):
                          continue

                      total_links += 1
                      link_path = link.split('#')[0].split('?')[0]
                      if not link_path:
                          continue

                      if link_path.startswith('/'):
                          target = Path('docs') / link_path.lstrip('/')
                      else:
                          target = md_file.parent / link_path

                      target_str = str(target)
                      if not Path(target_str).exists():
                          if not Path(target_str + '.md').exists():
                              if not Path(target_str.rstrip('/') + '/README.md').exists():
                                  broken_links.append((str(md_file), link))

              print(f'Total internal links checked: {total_links}')
              print(f'Broken links found: {len(broken_links)}')
              if broken_links:
                  print('\nBroken links (first 20):')
                  for file_path, link in broken_links[:20]:
                      print(f'  {file_path}: {link}')
          PYEOF
          echo "checker_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: link-check-report
          path: link_checker_output.log

      - name: Create or update issue on broken links
        if: steps.run_checker.outputs.checker_exit_code != '0'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let logOutput = '';
            try {
              logOutput = fs.readFileSync('link_checker_output.log', 'utf8');
            } catch (error) {
              logOutput = 'Error reading link checker log.';
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['broken-links']
            });

            const issueTitle = 'Broken Links Detected';
            const issueBody = `## Broken Links Report\n\nThe link checker has detected broken links in the documentation.\n\n\`\`\`\n${logOutput.substring(0, 3000)}\n\`\`\`\n\nPlease fix these links to ensure documentation integrity.`;

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: issueBody
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['broken-links', 'documentation', 'bug']
              });
            }
