name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Pin actions to specific versions for supply-chain security.
# Prefer exact patch versions (e.g. @v6.0.0) over floating majors (@v6).
# For maximum security, pin to commit SHAs and add a comment with the version.

jobs:
  validate:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Validate MkDocs configuration
        run: mkdocs build --verbose 2>&1 | tail -20

      - name: Check for broken internal links
        continue-on-error: true
        run: |
          python -c "
          import asyncio
          from csa_docs_tools import LinkValidator
          from pathlib import Path

          async def validate():
              async with LinkValidator(Path('.')) as validator:
                  results = await validator.validate_all_links(check_external=False)
                  broken = validator.get_broken_links(results)
                  if broken:
                      print(f'Found {len(broken)} broken internal links:')
                      for link in broken[:10]:
                          print(f'  {link.source_file}:{link.line_number} -> {link.url}')
                  else:
                      print('No broken internal links found!')

          asyncio.run(validate())
          "

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          install-extras: 'dev'
          install-requirements: 'false'

      - name: Run ruff linter
        run: ruff check src/

      - name: Run ruff format check
        run: ruff format --check src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  test:
    name: Test Python Tools
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          install-extras: 'test'

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          test-type: 'unit'
          coverage-fail-under: '70'
          upload-coverage: 'true'

  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Build and upload documentation
        uses: ./.github/actions/build-docs
        with:
          upload-artifact: 'true'
          artifact-name: documentation-site-${{ github.sha }}

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc
